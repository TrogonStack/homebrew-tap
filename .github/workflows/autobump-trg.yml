name: Autobump trg

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Get latest upstream version
        id: upstream
        run: |
          VERSION=$(curl -sL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/TrogonStack/rusty-monorepo/releases" \
            | jq -r '[.[] | select(.tag_name | startswith("trg@v"))] | first | .tag_name | ltrimstr("trg@v")')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get current formula version
        id: current
        run: |
          VERSION=$(grep '^  version ' Formula/trg.rb | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if bump needed
        id: check
        run: |
          if [ "${{ steps.upstream.outputs.version }}" = "${{ steps.current.outputs.version }}" ]; then
            echo "needed=false" >> $GITHUB_OUTPUT
            echo "Already at ${{ steps.current.outputs.version }}, nothing to do."
          else
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "Bumping ${{ steps.current.outputs.version }} → ${{ steps.upstream.outputs.version }}"
          fi

      - name: Fetch SHA256 checksums
        if: steps.check.outputs.needed == 'true'
        id: checksums
        run: |
          VERSION="${{ steps.upstream.outputs.version }}"
          BASE="https://github.com/TrogonStack/rusty-monorepo/releases/download/trg@v${VERSION}"

          fetch_sha() {
            curl -sL "$1" | sha256sum | awk '{print $1}'
          }

          echo "macos_arm64=$(fetch_sha ${BASE}/trg-${VERSION}-aarch64-apple-darwin.tar.gz)" >> $GITHUB_OUTPUT
          echo "macos_x86=$(fetch_sha ${BASE}/trg-${VERSION}-x86_64-apple-darwin.tar.gz)" >> $GITHUB_OUTPUT
          echo "linux_arm64=$(fetch_sha ${BASE}/trg-${VERSION}-aarch64-unknown-linux-gnu.tar.gz)" >> $GITHUB_OUTPUT
          echo "linux_x86=$(fetch_sha ${BASE}/trg-${VERSION}-x86_64-unknown-linux-gnu.tar.gz)" >> $GITHUB_OUTPUT

      - name: Update formula
        if: steps.check.outputs.needed == 'true'
        run: |
          VERSION="${{ steps.upstream.outputs.version }}"
          MACOS_ARM64="${{ steps.checksums.outputs.macos_arm64 }}"
          MACOS_X86="${{ steps.checksums.outputs.macos_x86 }}"
          LINUX_ARM64="${{ steps.checksums.outputs.linux_arm64 }}"
          LINUX_X86="${{ steps.checksums.outputs.linux_x86 }}"

          python3 - <<EOF
          import re

          with open("Formula/trg.rb") as f:
              content = f.read()

          version = "${VERSION}"
          base = f"https://github.com/TrogonStack/rusty-monorepo/releases/download/trg@v{version}"

          archs = {
              "aarch64-apple-darwin":       ("${MACOS_ARM64}", "macos"),
              "x86_64-apple-darwin":        ("${MACOS_X86}",   "macos"),
              "aarch64-unknown-linux-gnu":  ("${LINUX_ARM64}", "linux"),
              "x86_64-unknown-linux-gnu":   ("${LINUX_X86}",   "linux"),
          }

          content = re.sub(r'version "[^"]+"', f'version "{version}"', content)

          for arch, (sha, _) in archs.items():
              content = re.sub(
                  rf'(url ")[^"]+({arch}\.tar\.gz")',
                  rf'\g<1>{base}/trg-{version}-{arch}.tar.gz"',
                  content
              )
              content = re.sub(
                  rf'({arch}\.tar\.gz"\n\s+sha256 ")[a-f0-9]+"',
                  rf'\g<1>{sha}"',
                  content
              )

          with open("Formula/trg.rb", "w") as f:
              f.write(content)
          EOF

      - name: Open PR
        if: steps.check.outputs.needed == 'true'
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c5e6f51e28 # v7.0.8
        with:
          token: ${{ secrets.GH_PAT_RELEASE_PLEASE_ACTION }}
          commit-message: "chore: bump trg to ${{ steps.upstream.outputs.version }}"
          branch: "bump-trg-${{ steps.upstream.outputs.version }}"
          title: "chore: bump trg to ${{ steps.upstream.outputs.version }}"
          body: |
            Automated formula bump for `trg`.

            - **Previous version**: `${{ steps.current.outputs.version }}`
            - **New version**: `${{ steps.upstream.outputs.version }}`
          labels: |
            bot
            bump-formula-pr
